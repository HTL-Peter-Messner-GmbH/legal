<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Legal – App-Richtlinien</title>
  <style>
    :root {
      --bg: #ffffff;
      --text: #1a1a1a;
      --muted: #555;
      --accent: #0066cc;
      --border: #e0e0e0;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      line-height: 1.7;
      color: var(--text);
      background: var(--bg);
      padding: 2rem 1rem;
    }

    .container {
      max-width: 720px;
      margin: 0 auto;
    }

    h1 {
      font-size: 1.8rem;
      margin-bottom: 0.5rem;
    }

    .subtitle {
      color: var(--muted);
      font-size: 0.95rem;
      margin-bottom: 2rem;
    }

    h2 {
      font-size: 1.3rem;
      margin-top: 2rem;
      margin-bottom: 0.5rem;
      padding-bottom: 0.3rem;
      border-bottom: 1px solid var(--border);
    }

    ul {
      padding-left: 1.5rem;
      margin-top: 0.5rem;
    }

    li {
      margin-bottom: 0.5rem;
    }

    a {
      color: var(--accent);
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>App-Richtlinien</h1>
    <p class="subtitle">Rechtliche Dokumente für unsere Android-Apps</p>

    <h2>Lagerbestand Scanner</h2>
    <ul>
      <li><a href="lagerbestand/privacy-policy.html">Datenschutzerklärung</a></li>
    </ul>

    <!-- Weitere Apps hier ergänzen:
    <h2>App-Name</h2>
    <ul>
      <li><a href="app-name/privacy-policy.html">Datenschutzerklärung</a></li>
    </ul>
    -->
  </div>
</body>

</html>
